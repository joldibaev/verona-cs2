# Development overlay. Applied on top of docker-compose.yml by dev.bat.
#
# The admin service is swapped from the baked production image to the .NET SDK
# running `dotnet watch`: source is bind-mounted, so C# edits hot-reload without
# rebuilding the image. Postgres is exposed on the host for optional native tools.
# The frontend is NOT run here — dev.bat starts Vite locally (HMR) and proxies
# /api and /hub to this container on :8080 (see admin/ui/vite.config.ts).
services:
  admin:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    build: !reset null
    working_dir: /src/admin/Verona.Admin
    # Poll for file changes: bind-mounted Windows filesystems don't deliver inotify
    # events into the Linux container, so the default watcher would never fire.
    command: sh -c "dotnet watch run --no-launch-profile --non-interactive --urls http://+:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
    volumes:
      # Mount the whole admin tree so Program.cs can reach ../ui/public catalogs.
      - ./admin:/src/admin
      # Named volumes keep Linux build output out of the host's Windows bin/obj
      # and avoid creating anonymous volumes with random hashes.
      - admin-bin:/src/admin/Verona.Admin/bin
      - admin-obj:/src/admin/Verona.Admin/obj

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  admin-bin:
    name: verona-cs2-admin-bin
  admin-obj:
    name: verona-cs2-admin-obj
