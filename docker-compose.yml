name: verona-cs2

services:
  cs2:
    profiles: ["game"]
    image: verona-cs2-server:latest
    build:
      context: .
      args:
        COUNTERSTRIKESHARP_VERSION: "1.0.370"
        METAMOD_VERSION: "2.0.0-git1402"
    container_name: verona-cs2-server
    # The game server container starts with the stack but stays idle (sleeping)
    # until started from the admin panel.
    restart: "no"
    environment:
      GSLT: "${GSLT:-}"
      SERVER_HOSTNAME: "${SERVER_HOSTNAME:-Verona CS2 development server}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      RCON_PASSWORD: "${RCON_PASSWORD:-change-me}"
      START_MAP: "${START_MAP:-de_dust2}"
      GAME_TYPE: "${GAME_TYPE:-0}"
      GAME_MODE: "${GAME_MODE:-0}"
      MAX_PLAYERS: "${MAX_PLAYERS:-10}"
      STEAMCMD_VALIDATE: "${STEAMCMD_VALIDATE:-0}"
      SKINS_CONFIG_PATH: /config/skins.json
      VERONA_ADMIN_URL: http://admin:8080
      VERONA_PLUGIN_API_KEY: "${VERONA_PLUGIN_API_KEY}"
    depends_on:
      admin:
        condition: service_started
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
    volumes:
      # Keep the very large Steam installation between container rebuilds.
      - cs2-data:/server
      # Administrator-owned data stays visible, portable and read-only to the server.
      - ./config:/config:ro
      - ./logs:/server/game/csgo/logs
    stdin_open: true
    tty: true

  admin:
    build:
      context: .
      dockerfile: admin/Verona.Admin/Dockerfile
    image: verona-cs2-admin:latest
    container_name: verona-cs2-admin
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Used only if the database has no admin role yet; PostgreSQL is authoritative afterwards.
      AdminSteamIds: "${ADMIN_STEAM_IDS:-}"
      # Optional official FACEIT Data API key; without it profiles show no ELO.
      FaceitApiKey: "${FACEIT_API_KEY:-}"
      PluginApiKey: "${VERONA_PLUGIN_API_KEY}"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=verona_cs2;Username=verona_cs2;Password=${POSTGRES_PASSWORD}"
      PublicUrl: "${PUBLIC_URL:-}"
    ports:
      - "127.0.0.1:${VERONA_PORT:-8080}:8080"
    volumes:
      # Docker socket access is intentionally local-only and the API hardcodes
      # verona-server; never expose the admin port publicly with this mount.
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-write so the panel can write launch.env consumed by the cs2 entrypoint.
      - ./config:/config
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: verona-cs2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: verona_cs2
      POSTGRES_USER: verona_cs2
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verona_cs2 -d verona_cs2"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  cs2-data:
    name: verona-cs2-data
    external: true
  postgres-data:
    name: verona-cs2-postgres-data
